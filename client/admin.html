<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" href="images/fav.png">
    
    <!-- Fonts and Bootstrap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS (Reusing some styles from makemytrip.css for consistency) -->
    <style>
        body {
            background-color: #0f0f0f;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background-color: #111;
            height: 100vh;
            padding: 20px;
            position: fixed;
            border-right: 1px solid #333;
        }
        .sidebar h2 {
            color: #E50914;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }
        .sidebar a {
            display: block;
            color: #ccc;
            text-decoration: none;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #E50914;
            color: white;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-top: 4px solid #E50914;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-card h3 {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        .stat-card p {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
            color: #fff;
        }
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .chart-box {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 10px;
        }
        .table-container {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 10px;
        }
        table {
            width: 100%;
            color: white;
        }
        table th {
            border-bottom: 1px solid #333;
            padding: 10px;
            color: #aaa;
        }
        table td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .btn-cinemax {
            background-color: #E50914;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-cinemax:hover {
            background-color: #f40612;
        }
        .btn-danger-outline {
            background-color: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-danger-outline:hover {
            background-color: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CINEMAX</h2>
        <a href="makemytrip.html">← Back to App</a>
        <a href="#dashboard" class="active">Dashboard</a>
        <a href="#movies">Manage Movies</a>
        <a href="#" id="logoutBtn" style="margin-top: 50px;">Logout</a>
    </div>

    <div class="main-content">
        <div id="error-message" style="display:none; background-color:#ff4d4d; padding:15px; border-radius:5px; margin-bottom:20px;"></div>

        <h2 class="mb-4">Overview</h2>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="stat-users">-</p>
            </div>
            <div class="stat-card">
                <h3>Total Movies</h3>
                <p id="stat-movies">-</p>
            </div>
            <div class="stat-card">
                <h3>Total Bookings</h3>
                <p id="stat-bookings">-</p>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p id="stat-revenue">₹0</p>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h4>Revenue by Movie</h4>
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="chart-box">
                <h4>System Distribution</h4>
                <canvas id="distChart"></canvas>
            </div>
        </div>

        <div class="table-container" id="movies">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Manage Movies</h4>
                <button class="btn-cinemax" data-bs-toggle="modal" data-bs-target="#addMovieModal">+ Add Movie</button>
            </div>
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Year</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="moviesTableBody">
                    <tr><td colspan="4">Loading movies...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Movie Modal -->
    <div class="modal fade" id="addMovieModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="background-color: #1f1f1f; color: white;">
                <div class="modal-header" style="border-bottom: 1px solid #333;">
                    <h5 class="modal-title">Add New Movie</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addMovieForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="movieTitle" required style="background-color: #333; color: white; border: none;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Poster URL</label>
                            <input type="text" class="form-control" id="moviePoster" value="images/poster/default.jpg" required style="background-color: #333; color: white; border: none;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rating</label>
                            <input type="number" step="0.1" class="form-control" id="movieRating" required style="background-color: #333; color: white; border: none;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Genres (Comma separated)</label>
                            <input type="text" class="form-control" id="movieGenres" placeholder="Action, Drama" required style="background-color: #333; color: white; border: none;">
                        </div>
                        <button type="submit" class="btn-cinemax w-100">Save Movie</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
