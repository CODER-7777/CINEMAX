<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="NAAD.css">
    <style>
        .login-container {
            width: 100%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            padding: 60px 68px 40px;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: left;
            color: #fff;
        }
        .login-container h2 {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 28px;
            color: #fff;
        }
        .login-container form input {
            width: 100%;
            height: 50px;
            background: #333;
            color: #fff;
            border: 0;
            outline: 0;
            border-radius: 4px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        .login-container form button {
            width: 100%;
            padding: 15px 0;
            background: #db0001;
            color: #fff;
            border: 0;
            outline: 0;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .login-container .form-help {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #b3b3b3;
            margin-top: 10px;
        }
        .login-container .remember-me {
            display: flex;
            align-items: center;
        }
        .login-container small {
            font-size: 13px;
            color: #b3b3b3;
            margin-top: 15px;
            display: block;
        }
        .login-container a {
            color: #fff;
            text-decoration: none;
        }
        .login-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header" style="height: 100vh;"> 
        <nav>
            <img src="images/logo.png" alt="logo">
            <div></div>
        </nav>
        <div class="login-container">
            <div id="signInSection">
                <h2>Sign In</h2>
                <form id="signInForm">
                    <input type="email" id="signInEmail" placeholder="Email or phone number" required>
                    <input type="password" id="signInPassword" placeholder="Password" required>
                    <button type="submit">Sign In</button>
                    <div class="form-help">
                        <div class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <label for="rememberMe">Remember me</label>
                        </div>
                        <a href="#">Need help?</a>
                    </div>
                </form>
                <small>New to ACA253 Movie Store? <a href="#" id="toggleSignUp">Sign up now</a>.</small>
            </div>
            <div id="signUpSection" style="display:none;">
                <h2>Sign Up</h2>
                <form id="signUpForm">
                    <input type="email" id="signUpEmail" placeholder="Email or phone number" required>
                    <input type="password" id="signUpPassword" placeholder="Password" required>
                    <button type="submit">Sign Up</button>
                </form>
                <small>Already have an account? <a href="#" id="toggleSignIn">Sign in now</a>.</small>
            </div>
        </div>
    </div>
    <script src="NAAD.js"></script>
</body>
</html>
